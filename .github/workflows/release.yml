name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install release tooling
        run: python -m pip install -e .[release]

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  homebrew-tap:
    needs:
      - build
      - github-release
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Check tap token
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "missing HOMEBREW_TAP_TOKEN secret" >&2
            exit 1
          fi

      - name: Checkout bdsc-cli
        uses: actions/checkout@v4
        with:
          path: bdsc-cli

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gumadeiras/homebrew-tap
          token: ${{ env.TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        run: |
          python bdsc-cli/scripts/render_homebrew_formula.py \
            dist/bdsc_cli-${GITHUB_REF_NAME#v}.tar.gz \
            --output homebrew-tap/Formula/bdsc-cli.rb

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/bdsc-cli.rb; then
            echo "Formula/bdsc-cli.rb already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/bdsc-cli.rb
          git commit -m "Update bdsc-cli to ${GITHUB_REF_NAME#v}"
          git push
